[schedule]
# Comma-separated 24h hours at which the job fires — validated at startup
hours = 9,11,13,15,17,19,21,23
# Minute past the hour (0–59) — validated at startup
minute = 30
# IANA timezone name — validated at startup; used for CSV filenames and scheduling
timezone = Asia/Kathmandu
# Maximum wall-clock seconds for one full collection run before it is
# considered hung and abandoned. Default: 1800 (30 min). Tune down if the
# 2-hour interval leaves insufficient margin after a worst-case run.
run_timeout_seconds = 1800

[output]
# Directory where timestamped CSV files are written (created automatically)
dir = output
# Filename prefix — final name: <prefix><YYYYMMDDHHmm>.csv
prefix = report_

[logging]
# Log file path (relative to project root)
file = scheduler.log
# DEBUG | INFO | WARNING | ERROR
level = INFO

[fetch]
# Maximum number of retry attempts after the first failed HTTP request.
# Total attempts per URL = max_retries + 1.  Set to 0 to disable retries.
max_retries = 3
# Base wait time in seconds before the first retry.
# Each subsequent retry doubles the wait (exponential back-off: 2s, 4s, 8s).
retry_delay = 2
# Path to the TOML file that defines currencies and their source URLs.
# Can be absolute or relative to the working directory.
currencies_file = currencies.toml
